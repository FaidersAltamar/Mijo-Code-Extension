<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif">
  <rect width="900" height="260" rx="14" fill="#0d1117" stroke="#30363d"/>
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#e6edf3">One extension, every provider</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#8b949e">Sign in with your existing accounts, bring API keys, or go fully local</text>

  <!-- row 1: OAuth accounts -->
  <text x="60" y="105" font-size="13" font-weight="700" fill="#a371f7">OAUTH SIGN-IN</text>
  <g font-size="13" font-weight="600">
    <rect x="60" y="118" width="150" height="34" rx="17" fill="#161b22" stroke="#a371f7"/>
    <text x="135" y="140" text-anchor="middle" fill="#e6edf3">Claude Code</text>
    <rect x="222" y="118" width="150" height="34" rx="17" fill="#161b22" stroke="#a371f7"/>
    <text x="297" y="140" text-anchor="middle" fill="#e6edf3">OpenAI Codex</text>
    <rect x="384" y="118" width="180" height="34" rx="17" fill="#161b22" stroke="#a371f7"/>
    <text x="474" y="140" text-anchor="middle" fill="#e6edf3">Google Antigravity</text>
  </g>
  <text x="590" y="140" font-size="12" fill="#8b949e">-> your subscription, inside VS Code</text>

  <!-- row 2: API + local -->
  <text x="60" y="190" font-size="13" font-weight="700" fill="#2f81f7">API &amp; LOCAL</text>
  <g font-size="13" font-weight="600">
    <rect x="60" y="203" width="90" height="34" rx="17" fill="#161b22" stroke="#2f81f7"/>
    <text x="105" y="225" text-anchor="middle" fill="#e6edf3">OpenAI</text>
    <rect x="160" y="203" width="105" height="34" rx="17" fill="#161b22" stroke="#2f81f7"/>
    <text x="212" y="225" text-anchor="middle" fill="#e6edf3">Anthropic</text>
    <rect x="275" y="203" width="90" height="34" rx="17" fill="#161b22" stroke="#2f81f7"/>
    <text x="320" y="225" text-anchor="middle" fill="#e6edf3">Gemini</text>
    <rect x="375" y="203" width="120" height="34" rx="17" fill="#161b22" stroke="#2f81f7"/>
    <text x="435" y="225" text-anchor="middle" fill="#e6edf3">OpenRouter</text>
    <rect x="505" y="203" width="95" height="34" rx="17" fill="#161b22" stroke="#3fb950"/>
    <text x="552" y="225" text-anchor="middle" fill="#3fb950">Ollama</text>
    <rect x="610" y="203" width="110" height="34" rx="17" fill="#161b22" stroke="#3fb950"/>
    <text x="665" y="225" text-anchor="middle" fill="#3fb950">llama.cpp</text>
    <rect x="730" y="203" width="120" height="34" rx="17" fill="#161b22" stroke="#d29922" stroke-dasharray="5 3"/>
    <text x="790" y="225" text-anchor="middle" fill="#d29922">+ Custom...</text>
  </g>
</svg>
