<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#2f81f7"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2f81f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2f81f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="220" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="218" rx="13" fill="none" stroke="#30363d"/>
  <circle cx="740" cy="110" r="160" fill="url(#glow)"/>

  <!-- cursor mark -->
  <g transform="translate(60,58)">
    <path d="M0 0 L34 86 L46 52 L82 42 Z" fill="url(#accent)"/>
    <path d="M0 0 L34 86 L46 52 L82 42 Z" fill="none" stroke="#8b949e" stroke-opacity="0.4"/>
  </g>

  <text x="170" y="98" font-size="46" font-weight="700" fill="#e6edf3">Open<tspan fill="#2f81f7">Cursor</tspan></text>
  <text x="172" y="134" font-size="17" fill="#8b949e">The open-source AI coding agent for VS Code - built to run 100% on your machine.</text>

  <!-- feature pills -->
  <g font-size="13" font-weight="600">
    <rect x="172" y="152" width="130" height="26" rx="13" fill="#3fb95022" stroke="#3fb950"/>
    <text x="237" y="169" text-anchor="middle" fill="#3fb950">Offline-first</text>
    <rect x="312" y="152" width="120" height="26" rx="13" fill="#7c3aed22" stroke="#a371f7"/>
    <text x="372" y="169" text-anchor="middle" fill="#a371f7">llama.cpp</text>
    <rect x="442" y="152" width="100" height="26" rx="13" fill="#2f81f722" stroke="#2f81f7"/>
    <text x="492" y="169" text-anchor="middle" fill="#2f81f7">Ollama</text>
    <rect x="552" y="152" width="190" height="26" rx="13" fill="#d2992222" stroke="#d29922"/>
    <text x="647" y="169" text-anchor="middle" fill="#d29922">Local semantic search</text>
  </g>

  <!-- terminal snippet -->
  <g transform="translate(680,22)">
    <rect width="180" height="84" rx="8" fill="#0d1117" stroke="#30363d"/>
    <circle cx="16" cy="14" r="4" fill="#ff5f56"/><circle cx="30" cy="14" r="4" fill="#ffbd2e"/><circle cx="44" cy="14" r="4" fill="#27c93f"/>
    <text x="12" y="40" font-size="11" font-family="Consolas, monospace" fill="#3fb950">$ llama-server [ok]</text>
    <text x="12" y="58" font-size="11" font-family="Consolas, monospace" fill="#8b949e">wifi: off</text>
    <text x="12" y="76" font-size="11" font-family="Consolas, monospace" fill="#e6edf3">agent: coding...</text>
  </g>
</svg>
