<svg xmlns="http://www.w3.org/2000/svg" width="900" height="330" viewBox="0 0 900 330" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#10182a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#2f81f7"/>
    </marker>
  </defs>
  <rect width="900" height="330" rx="14" fill="url(#bg2)" stroke="#30363d"/>
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#e6edf3">Everything runs on your machine</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#8b949e">No cloud required. Unplug the internet - keep coding.</text>

  <!-- VS Code box -->
  <g transform="translate(50,95)">
    <rect width="230" height="185" rx="10" fill="#161b22" stroke="#2f81f7"/>
    <text x="115" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#2f81f7">VS Code + OpenCursor</text>
    <g font-size="12" fill="#8b949e">
      <text x="20" y="65">- Agent chat sidebar</text>
      <text x="20" y="95">- Semantic search</text>
      <text x="20" y="125">- 25 agent tools</text>
      <text x="20" y="155">- Keep / Undo review</text>
    </g>
  </g>

  <!-- arrows -->
  <line x1="285" y1="140" x2="365" y2="122" stroke="#2f81f7" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="285" y1="190" x2="365" y2="190" stroke="#2f81f7" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="285" y1="240" x2="365" y2="258" stroke="#2f81f7" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- llama.cpp -->
  <g transform="translate(370,90)">
    <rect width="240" height="64" rx="10" fill="#161b22" stroke="#a371f7"/>
    <text x="16" y="27" font-size="14" font-weight="700" fill="#a371f7">llama.cpp</text>
    <text x="16" y="48" font-size="11.5" fill="#8b949e">GGUF models, auto server spawn</text>
  </g>

  <!-- ollama -->
  <g transform="translate(370,163)">
    <rect width="240" height="64" rx="10" fill="#161b22" stroke="#3fb950"/>
    <text x="16" y="27" font-size="14" font-weight="700" fill="#3fb950">Ollama</text>
    <text x="16" y="48" font-size="11.5" fill="#8b949e">Pull, manage &amp; chat with local models</text>
  </g>

  <!-- embeddings -->
  <g transform="translate(370,236)">
    <rect width="240" height="64" rx="10" fill="#161b22" stroke="#d29922"/>
    <text x="16" y="27" font-size="14" font-weight="700" fill="#d29922">Local embeddings</text>
    <text x="16" y="48" font-size="11.5" fill="#8b949e">MiniLM ONNX | 100% on-device index</text>
  </g>

  <!-- offline badge -->
  <g transform="translate(650,120)">
    <rect width="200" height="145" rx="10" fill="#161b22" stroke="#30363d"/>
    <circle cx="100" cy="55" r="32" fill="none" stroke="#3fb950" stroke-width="3"/>
    <path d="M85 55 l10 10 l22 -22" fill="none" stroke="#3fb950" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="100" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#3fb950">Works offline</text>
    <text x="100" y="133" text-anchor="middle" font-size="11" fill="#8b949e">zero data leaves your PC</text>
  </g>
  <line x1="615" y1="192" x2="645" y2="192" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
