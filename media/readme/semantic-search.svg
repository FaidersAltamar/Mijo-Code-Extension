<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#d29922"/>
    </marker>
  </defs>
  <rect width="900" height="240" rx="14" fill="#0d1117" stroke="#30363d"/>
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#e6edf3">Semantic codebase search - embedded locally</text>

  <!-- query -->
  <g transform="translate(40,80)">
    <rect width="220" height="100" rx="10" fill="#161b22" stroke="#30363d"/>
    <text x="16" y="28" font-size="12" fill="#8b949e">You ask:</text>
    <text x="16" y="55" font-size="13" font-family="Consolas, monospace" fill="#e6edf3">"where do we refresh</text>
    <text x="16" y="75" font-size="13" font-family="Consolas, monospace" fill="#e6edf3"> the auth token?"</text>
  </g>
  <line x1="265" y1="130" x2="315" y2="130" stroke="#d29922" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- embedding -->
  <g transform="translate(320,70)">
    <rect width="250" height="120" rx="10" fill="#161b22" stroke="#d29922"/>
    <text x="125" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#d29922">all-MiniLM-L6-v2 | ONNX</text>
    <g font-family="Consolas, monospace" font-size="11" fill="#8b949e">
      <text x="125" y="55" text-anchor="middle">[0.12, -0.87, 0.44, ...]</text>
      <text x="125" y="75" text-anchor="middle">384-dim vectors</text>
    </g>
    <text x="125" y="103" text-anchor="middle" font-size="11.5" fill="#3fb950">runs on-device | no API key</text>
  </g>
  <line x1="575" y1="130" x2="625" y2="130" stroke="#d29922" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- results -->
  <g transform="translate(630,70)">
    <rect width="230" height="120" rx="10" fill="#161b22" stroke="#30363d"/>
    <text x="16" y="28" font-size="12" fill="#8b949e">Top matches:</text>
    <g font-family="Consolas, monospace" font-size="11.5">
      <text x="16" y="52" fill="#3fb950">&gt; auth/refresh.ts:41  0.93</text>
      <text x="16" y="74" fill="#2f81f7">&gt; api/session.ts:12   0.88</text>
      <text x="16" y="96" fill="#8b949e">&gt; hooks/useAuth.ts:7  0.81</text>
    </g>
  </g>

  <text x="450" y="222" text-anchor="middle" font-size="12" fill="#8b949e">Incremental indexing | 40-line sliding chunks | stored locally - your code never leaves your machine</text>
</svg>
